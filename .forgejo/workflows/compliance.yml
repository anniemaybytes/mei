name: compliance

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
        types: [ opened, synchronize, reopened ]

concurrency:
    group: ${{ forge.workflow }}-${{ forge.ref }}
    cancel-in-progress: ${{ forge.event_name == 'pull_request' }}

env:
    PHP_VERSION: 8.4
    PHP_EXTENSIONS: xml, gd, imagick, curl, mysql, bcmath, mbstring

jobs:
    backend:
        runs-on: ubuntu-24.04
        steps:
            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            -   name: Prepare environment
                id: ext-cache
                uses: shivammathur/cache-extensions@9b476298b44f2e4d4268dd103ff4c3e216314e27 # v1
                with:
                    php-version: ${{ env.PHP_VERSION }}
                    extensions: ${{ env.PHP_EXTENSIONS }}
                    key: cache-v1
            -   name: Cache extensions
                uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
                with:
                    path: ${{ steps.ext-cache.outputs.dir }}
                    key: ${{ steps.ext-cache.outputs.key }}
                    restore-keys: ${{ steps.ext-cache.outputs.key }}
            -   name: Set up PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
                with:
                    php-version: ${{ env.PHP_VERSION }}
                    extensions: ${{ env.PHP_EXTENSIONS }}
                    tools: composer
                    coverage: none
                env:
                    fail-fast: true
            -   name: Get composer cache directory
                id: deps-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
            -   name: Cache dependencies
                uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
                with:
                    path: ${{ steps.deps-cache.outputs.dir }}
                    key: ${{ runner.os }}-${{ runner.arch }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: ${{ runner.os }}-${{ runner.arch }}-composer-
            -   name: Install dependencies
                run: |
                    composer validate --ansi --no-check-all --no-check-publish
                    composer install --no-progress --ansi --prefer-dist
            -   name: Cache linters
                uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
                with:
                    path: |
                        .phpstan-cache
                        .phplint-cache
                        .phpcs-cache
                    key: ${{ runner.os }}-${{ runner.arch }}-linters-${{ forge.run_id }}
                    restore-keys: |
                        ${{ runner.os }}-${{ runner.arch }}-linters-
            -   name: PHPLint
                run: composer phplint
            -   name: PHPStan
                run: composer phpstan
            -   name: PHP_CodeSniffer
                run: composer phpcs